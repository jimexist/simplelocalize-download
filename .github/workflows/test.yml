name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # Ruff needs no compiled extension, so skip the Rust build entirely and
      # run the version pinned in uv.lock for reproducibility.
      - name: Ruff lint
        run: uvx ruff@0.15.20 check
      - name: Ruff format
        run: uvx ruff@0.15.20 format --check

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pyo3 links libpython for `cargo test`/`cargo clippy` (extension-module is
      # only enabled by maturin), so a Python with a shared lib must be present.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  python:
    name: Python (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync (builds the extension)
        run: uv sync
      - name: Build extension in place
        run: uv run maturin develop
      - name: Mypy
        run: |
          uv run mypy
          uv run mypy tests/typing_example.py
      - name: Pytest
        run: uv run pytest -q
